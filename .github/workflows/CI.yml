name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

env:
  node-version: '20.x'

jobs:
  node-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x', '24.x', '25.x']
    name: node-tests (Node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.node-version }}
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run

  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.node-version }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - run: npm ci
      - run: pip install cfn-lint
      - name: Synthesize & lint all examples (parallel)
        run: |
          lint_one() {
            config="$1"
            name=$(basename "$config" .json)
            outdir="cdk.out-$name"
            echo "[$name] Starting synth..."
            if npx cdk synth --no-staging -q --output "$outdir" --context contextFile="$config" 2>&1; then
              echo "[$name] Running cfn-lint..."
              cfn-lint "$outdir"/*.template.json 2>&1 || { echo "::error::cfn-lint failed for $config"; return 1; }
              echo "[$name] ✅ Passed"
            else
              echo "::warning::Skipping cfn-lint for $config (synth failed — may require AWS credentials for VPC lookup)"
            fi
          }
          export -f lint_one
          printf '%s\n' examples/*.json | xargs -P 0 -I {} bash -c 'lint_one "$@"' _ {}
        env:
          CDK_DEFAULT_ACCOUNT: '123456789012'
          CDK_DEFAULT_REGION: 'us-east-1'

  cfn-diff:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.node-version }}
      - run: npm ci
      - name: CDK diff (single-domain example)
        run: npx cdk diff --no-staging --context contextFile=examples/single-domain.json 2>&1 || true
        env:
          CDK_DEFAULT_ACCOUNT: '123456789012'
          CDK_DEFAULT_REGION: 'us-east-1'
      - name: CDK diff (serverless example)
        run: npx cdk diff --no-staging --context contextFile=examples/serverless.json 2>&1 || true
        env:
          CDK_DEFAULT_ACCOUNT: '123456789012'
          CDK_DEFAULT_REGION: 'us-east-1'

  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: lychee Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --verbose
            --accept=200,403,429
            --exclude "http://localhost*"
            --exclude "https://localhost*"
            --exclude "https://opencollective.com/*"
            --exclude "http://schemas.xmlsoap.org/*"
            "**/*.html" "**/*.md" "**/*.txt" "**/*.json"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  all-ci-checks-pass:
    needs:
      - link-checker
      - node-tests
      - build
      - cfn-lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "One or more job cancelled, failed, or skipped" && exit 1
      - run: |
          echo '## :heavy_check_mark: All continuous integration checks pass' >> $GITHUB_STEP_SUMMARY
