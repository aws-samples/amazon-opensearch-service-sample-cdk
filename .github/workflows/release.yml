name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20.x'
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - run: npm pack

      - name: Synthesize CFN templates
        run: npx cdk synth --app "npx ts-node bin/cfn-synth.ts" --no-staging -o cfn.out

      - name: Minify CFN templates
        run: |
          for f in cfn.out/*.template.json; do
            name=$(basename "$f" .template.json)
            node -e "process.stdout.write(JSON.stringify(JSON.parse(require('fs').readFileSync('$f','utf8'))))" > "cfn-${name}.min.json"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          generate_release_notes: true
          files: |
            *.tgz
            cfn-*.min.json
